name: Deploy to Lightsail Container Service

# Auto-deploys on push to main. Equivalent to Railway's auto-deploy hook.
# Manual trigger also available from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LIGHTSAIL_SERVICE_NAME: container-service-1
  IMAGE_LABEL: web        # arbitrary tag stored inside the Lightsail registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # AWS credentials come from GitHub repo Settings → Secrets and
      # variables → Actions. Use an IAM user limited to Lightsail.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # `push-container-image` lives in a separate plugin binary that AWS
      # CLI doesn't bundle. Install it before pushing.
      - name: Install Lightsail Control plugin
        run: |
          curl "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o "/usr/local/bin/lightsailctl"
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --tag ${{ env.LIGHTSAIL_SERVICE_NAME }}:${{ github.sha }} \
            .

      - name: Push image to Lightsail
        id: push
        run: |
          # `push-container-image` is implemented by the lightsailctl plugin
          # and prints human-readable status to stdout, ignoring --output json.
          # We let it print whatever, then resolve the just-pushed image ref
          # via get-container-images (newest first).
          aws lightsail push-container-image \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --label ${{ env.IMAGE_LABEL }} \
            --image ${{ env.LIGHTSAIL_SERVICE_NAME }}:${{ github.sha }}

          IMAGE=$(aws lightsail get-container-images \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --query 'containerImages[0].image' \
            --output text)
          echo "Resolved image reference: $IMAGE"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
            echo "Could not resolve image reference after push" >&2
            exit 1
          fi
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # Build containers.json from GitHub Actions secrets. Avoids the
      # "preserve env vars from previous deployment" approach which is
      # fragile when the previous deployment never reached ACTIVE state.
      # The single source of truth for env values is GitHub Secrets.
      - name: Deploy
        env:
          # Application
          APP_URL: ${{ secrets.APP_URL }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          # Database & encryption
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          # VAPI
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          # GHL
          GHL_CLIENT_ID: ${{ secrets.GHL_CLIENT_ID }}
          GHL_CLIENT_SECRET: ${{ secrets.GHL_CLIENT_SECRET }}
          GHL_REDIRECT_URI: ${{ secrets.GHL_REDIRECT_URI }}
          # Google OAuth
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          # PayPal
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}
          # Whop
          WHOP_API_KEY: ${{ secrets.WHOP_API_KEY }}
          WHOP_COMPANY_ID: ${{ secrets.WHOP_COMPANY_ID }}
          WHOP_WEBHOOK_SECRET: ${{ secrets.WHOP_WEBHOOK_SECRET }}
          # Recordings → Lightsail Object Storage (S3-compatible)
          RECORDINGS_S3_BUCKET: ${{ secrets.RECORDINGS_S3_BUCKET }}
          RECORDINGS_S3_REGION: ${{ secrets.RECORDINGS_S3_REGION }}
          # IMPORTANT: bucket credentials are DIFFERENT from the workflow's
          # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY (which are the IAM user
          # that talks to Lightsail). The container needs its own pair to
          # access the bucket. Stored under BUCKET_* in GitHub Secrets to
          # avoid the name collision; mapped back to the standard names
          # the AWS SDK looks for inside the container.
          BUCKET_AWS_ACCESS_KEY_ID: ${{ secrets.BUCKET_AWS_ACCESS_KEY_ID }}
          BUCKET_AWS_SECRET_ACCESS_KEY: ${{ secrets.BUCKET_AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is empty. Add it under repo Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi
          if [ -z "$ENCRYPTION_KEY" ]; then
            echo "::error::ENCRYPTION_KEY secret is empty. This MUST match what Railway has." >&2
            exit 1
          fi

          jq -n \
            --arg image "${{ steps.push.outputs.image }}" \
            --arg APP_URL "$APP_URL" \
            --arg CLIENT_URL "$CLIENT_URL" \
            --arg WEBSITE_URL "$WEBSITE_URL" \
            --arg DATABASE_URL "$DATABASE_URL" \
            --arg ENCRYPTION_KEY "$ENCRYPTION_KEY" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg JWT_EXPIRES_IN "$JWT_EXPIRES_IN" \
            --arg VAPI_API_KEY "$VAPI_API_KEY" \
            --arg GHL_CLIENT_ID "$GHL_CLIENT_ID" \
            --arg GHL_CLIENT_SECRET "$GHL_CLIENT_SECRET" \
            --arg GHL_REDIRECT_URI "$GHL_REDIRECT_URI" \
            --arg GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID" \
            --arg GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET" \
            --arg GOOGLE_REDIRECT_URI "$GOOGLE_REDIRECT_URI" \
            --arg PAYPAL_CLIENT_ID "$PAYPAL_CLIENT_ID" \
            --arg PAYPAL_CLIENT_SECRET "$PAYPAL_CLIENT_SECRET" \
            --arg PAYPAL_MODE "$PAYPAL_MODE" \
            --arg PAYPAL_WEBHOOK_ID "$PAYPAL_WEBHOOK_ID" \
            --arg WHOP_API_KEY "$WHOP_API_KEY" \
            --arg WHOP_COMPANY_ID "$WHOP_COMPANY_ID" \
            --arg WHOP_WEBHOOK_SECRET "$WHOP_WEBHOOK_SECRET" \
            --arg RECORDINGS_S3_BUCKET "$RECORDINGS_S3_BUCKET" \
            --arg RECORDINGS_S3_REGION "$RECORDINGS_S3_REGION" \
            --arg AWS_ACCESS_KEY_ID "$BUCKET_AWS_ACCESS_KEY_ID" \
            --arg AWS_SECRET_ACCESS_KEY "$BUCKET_AWS_SECRET_ACCESS_KEY" \
            '{
              web: {
                image: $image,
                ports: { "8080": "HTTP" },
                environment: {
                  NODE_ENV: "production",
                  PORT: "8080",
                  APP_URL: $APP_URL,
                  CLIENT_URL: $CLIENT_URL,
                  WEBSITE_URL: $WEBSITE_URL,
                  DATABASE_URL: $DATABASE_URL,
                  ENCRYPTION_KEY: $ENCRYPTION_KEY,
                  JWT_SECRET: $JWT_SECRET,
                  JWT_EXPIRES_IN: $JWT_EXPIRES_IN,
                  VAPI_API_KEY: $VAPI_API_KEY,
                  GHL_CLIENT_ID: $GHL_CLIENT_ID,
                  GHL_CLIENT_SECRET: $GHL_CLIENT_SECRET,
                  GHL_REDIRECT_URI: $GHL_REDIRECT_URI,
                  GOOGLE_CLIENT_ID: $GOOGLE_CLIENT_ID,
                  GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET,
                  GOOGLE_REDIRECT_URI: $GOOGLE_REDIRECT_URI,
                  PAYPAL_CLIENT_ID: $PAYPAL_CLIENT_ID,
                  PAYPAL_CLIENT_SECRET: $PAYPAL_CLIENT_SECRET,
                  PAYPAL_MODE: $PAYPAL_MODE,
                  PAYPAL_WEBHOOK_ID: $PAYPAL_WEBHOOK_ID,
                  WHOP_API_KEY: $WHOP_API_KEY,
                  WHOP_COMPANY_ID: $WHOP_COMPANY_ID,
                  WHOP_WEBHOOK_SECRET: $WHOP_WEBHOOK_SECRET,
                  RECORDINGS_S3_BUCKET: $RECORDINGS_S3_BUCKET,
                  RECORDINGS_S3_REGION: $RECORDINGS_S3_REGION,
                  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID,
                  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                }
              }
            }' > containers.json

          echo "=== deployment containers payload (env values redacted) ==="
          jq 'walk(if type == "object" and has("environment") then .environment |= map_values("<redacted>") else . end)' containers.json

          aws lightsail create-container-service-deployment \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --containers file://containers.json \
            --public-endpoint file://.lightsail/public-endpoint.json

      - name: Wait for deployment to be active
        run: |
          # While a deployment is in progress it lives in `nextDeployment`
          # (state: ACTIVATING). Only after it becomes ACTIVE does it
          # replace `currentDeployment`. Check both so we don't poll on
          # a stale "None" while the real deployment is making progress.
          for i in {1..30}; do
            STATES=$(aws lightsail get-container-services \
              --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
              --query 'containerServices[0].[currentDeployment.state, nextDeployment.state]' \
              --output text)
            CURRENT=$(echo "$STATES" | awk '{print $1}')
            NEXT=$(echo "$STATES" | awk '{print $2}')
            echo "Attempt $i: current=$CURRENT next=$NEXT"

            # Success: either the new deployment we just created is active,
            # or it moved into current as ACTIVE without us catching the
            # transition in `next`.
            if [ "$NEXT" = "ACTIVE" ] || ( [ "$CURRENT" = "ACTIVE" ] && [ "$NEXT" = "None" ] ); then
              echo "Deployment active."
              exit 0
            fi
            if [ "$NEXT" = "FAILED" ]; then
              echo "Deployment failed (see Lightsail console for container logs)."
              exit 1
            fi
            sleep 20
          done
          echo "Deployment did not become active within 10 minutes."
          exit 1
