name: Deploy to Lightsail Container Service

# Auto-deploys on push to main. Equivalent to Railway's auto-deploy hook.
# Manual trigger also available from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LIGHTSAIL_SERVICE_NAME: container-service-1
  IMAGE_LABEL: web        # arbitrary tag stored inside the Lightsail registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # AWS credentials come from GitHub repo Settings → Secrets and
      # variables → Actions. Use an IAM user limited to Lightsail.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # `push-container-image` lives in a separate plugin binary that AWS
      # CLI doesn't bundle. Install it before pushing.
      - name: Install Lightsail Control plugin
        run: |
          curl "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" \
            -o "/usr/local/bin/lightsailctl"
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --tag ${{ env.LIGHTSAIL_SERVICE_NAME }}:${{ github.sha }} \
            .

      - name: Push image to Lightsail
        id: push
        run: |
          # `push-container-image` is implemented by the lightsailctl plugin
          # and prints human-readable status to stdout, ignoring --output json.
          # We let it print whatever, then resolve the just-pushed image ref
          # via get-container-images (newest first).
          aws lightsail push-container-image \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --label ${{ env.IMAGE_LABEL }} \
            --image ${{ env.LIGHTSAIL_SERVICE_NAME }}:${{ github.sha }}

          IMAGE=$(aws lightsail get-container-images \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --query 'containerImages[0].image' \
            --output text)
          echo "Resolved image reference: $IMAGE"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
            echo "Could not resolve image reference after push" >&2
            exit 1
          fi
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # Build the deployment payload by substituting the just-pushed image
      # into the containers template, then issue the deployment. Env vars
      # for the service (DATABASE_URL, secrets, etc.) live on the Lightsail
      # service itself and are preserved across deployments by merging the
      # currently-deployed env into the new container spec.
      - name: Deploy
        run: |
          jq --arg image "${{ steps.push.outputs.image }}" \
             '.web.image = $image' \
             .lightsail/containers.template.json > containers.json

          # Pull env vars from whatever container the previous deployment had
          # (could be `web`, `sword-ai`, or anything else if it was created
          # via the UI). Picks the first non-empty environment in the map.
          CURRENT=$(aws lightsail get-container-services \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --query 'containerServices[0].currentDeployment.containers.*.environment' \
            --output json 2>/dev/null \
            | jq 'map(select(. != null and . != {})) | .[0] // {}' 2>/dev/null \
            || echo '{}')

          if [ -z "$CURRENT" ]; then CURRENT='{}'; fi

          if [ "$CURRENT" != "null" ] && [ "$CURRENT" != "{}" ]; then
            echo "=== preserving $(echo "$CURRENT" | jq 'length') env vars from previous deployment ==="
            jq --argjson env "$CURRENT" \
               '.web.environment = ($env + .web.environment)' \
               containers.json > containers.merged.json
            mv containers.merged.json containers.json
          else
            echo "=== no previous env vars to preserve (first real deploy) ==="
          fi

          echo "=== deployment containers payload (env values redacted in logs) ==="
          jq 'walk(if type == "object" and has("environment") then .environment |= map_values("<redacted>") else . end)' containers.json

          aws lightsail create-container-service-deployment \
            --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
            --containers file://containers.json \
            --public-endpoint file://.lightsail/public-endpoint.json

      - name: Wait for deployment to be active
        run: |
          # While a deployment is in progress it lives in `nextDeployment`
          # (state: ACTIVATING). Only after it becomes ACTIVE does it
          # replace `currentDeployment`. Check both so we don't poll on
          # a stale "None" while the real deployment is making progress.
          for i in {1..30}; do
            STATES=$(aws lightsail get-container-services \
              --service-name ${{ env.LIGHTSAIL_SERVICE_NAME }} \
              --query 'containerServices[0].[currentDeployment.state, nextDeployment.state]' \
              --output text)
            CURRENT=$(echo "$STATES" | awk '{print $1}')
            NEXT=$(echo "$STATES" | awk '{print $2}')
            echo "Attempt $i: current=$CURRENT next=$NEXT"

            # Success: either the new deployment we just created is active,
            # or it moved into current as ACTIVE without us catching the
            # transition in `next`.
            if [ "$NEXT" = "ACTIVE" ] || ( [ "$CURRENT" = "ACTIVE" ] && [ "$NEXT" = "None" ] ); then
              echo "Deployment active."
              exit 0
            fi
            if [ "$NEXT" = "FAILED" ]; then
              echo "Deployment failed (see Lightsail console for container logs)."
              exit 1
            fi
            sleep 20
          done
          echo "Deployment did not become active within 10 minutes."
          exit 1
